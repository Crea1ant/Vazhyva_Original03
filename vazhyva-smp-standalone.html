<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Важива SMP - Minecraft Server</title>
    <meta name="description" content="Приєднуйтесь до нашої спільноти та створюйте незабутні пригоди разом!">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <style>
        @font-face {
            font-family: 'Minecraft';
            src: url('https://cdn.jsdelivr.net/gh/IdreesInc/Monocraft@main/fonts/woff2/Monocraft.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        
        @font-face {
            font-family: 'MinecraftRegular';
            src: url('https://cdn.jsdelivr.net/gh/South-Paw/typeface-minecraft@master/files/minecraft-regular.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Minecraft', 'MinecraftRegular', monospace;
            background-color: #2a1810;
            color: #fde047;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        
        /* Header */
        header {
            background-color: #1a0f08;
            border-bottom: 4px solid #fbbf24;
            position: sticky;
            top: 0;
            z-index: 50;
            animation: slideDown 0.6s ease-out;
        }
        
        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            max-width: 1280px;
            margin: 0 auto;
        }
        
        .logo-section {
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .logo-section:hover {
            transform: scale(1.05);
        }
        
        .logo {
            height: 4rem;
            width: auto;
        }
        
        .logo-text {
            font-size: 2rem;
            color: #fbbf24;
            font-weight: bold;
        }
        
        nav {
            display: none;
            gap: 1.5rem;
        }
        
        @media (min-width: 768px) {
            nav {
                display: flex;
            }
            .logo {
                height: 4rem;
            }
            .logo-text {
                font-size: 2.5rem;
            }
        }
        
        nav a {
            color: #fde047;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            transition: all 0.3s;
        }
        
        nav a:hover {
            color: #fbbf24;
            background-color: rgba(251, 191, 36, 0.1);
            transform: scale(1.1);
        }
        
        /* Splash Screen */
        #splash-screen {
            position: fixed;
            inset: 0;
            z-index: 100;
            background-color: #1a0f08;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            animation: fadeOut 0.5s ease-out 3s forwards;
        }
        
        #splash-screen.hidden {
            display: none;
        }
        
        .splash-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            animation: zoomOut 0.5s ease-out 3s forwards;
        }
        
        .splash-logo-container {
            position: relative;
            animation: logoAppear 1s ease-out;
        }
        
        .splash-glow {
            position: absolute;
            inset: 0;
            background: rgba(251, 191, 36, 0.5);
            border-radius: 50%;
            filter: blur(40px);
            animation: pulse 2s ease-in-out infinite;
        }
        
        .splash-logo {
            height: 10rem;
            width: 10rem;
            object-fit: contain;
            position: relative;
            z-index: 10;
        }
        
        .splash-text {
            text-align: center;
            animation: textAppear 0.5s ease-out 1s both;
        }
        
        .splash-title {
            font-size: 3rem;
            color: #fbbf24;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        
        .splash-subtitle {
            font-size: 1.25rem;
            color: #fde047;
            margin-bottom: 1rem;
        }
        
        .loading-bar-container {
            width: 16rem;
            height: 0.5rem;
            background-color: #2a1810;
            border: 2px solid #fbbf24;
            border-radius: 9999px;
            overflow: hidden;
        }
        
        .loading-bar {
            height: 100%;
            background-color: #fbbf24;
            animation: loadProgress 2s linear forwards;
        }
        
        .bg-blocks {
            position: absolute;
            inset: 0;
            opacity: 0.05;
        }
        
        .bg-block {
            position: absolute;
            width: 6rem;
            height: 6rem;
            border: 4px solid #fbbf24;
            animation: floatBlock 3s ease-in-out infinite;
        }
        
        /* Hero Section */
        .hero {
            position: relative;
            padding: 5rem 1rem;
            text-align: center;
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out;
        }
        
        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            animation: scaleIn 0.6s ease-out 0.2s both;
        }
        
        @media (min-width: 768px) {
            .hero h1 {
                font-size: 4.5rem;
            }
        }
        
        .hero p {
            font-size: 1.25rem;
            color: rgba(251, 191, 36, 0.8);
            margin-bottom: 2rem;
            animation: fadeIn 0.8s ease-out 0.4s both;
        }
        
        @media (min-width: 768px) {
            .hero p {
                font-size: 1.5rem;
            }
        }
        
        .cta-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            animation: fadeInUp 0.6s ease-out 0.6s both;
        }
        
        .btn-primary {
            background-color: #fbbf24;
            color: #2a1810;
            padding: 0.75rem 2rem;
            border-radius: 0.5rem;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
            box-shadow: 0 10px 25px rgba(251, 191, 36, 0.5);
            border: none;
            cursor: pointer;
            font-family: 'Minecraft', monospace;
        }
        
        .btn-primary:hover {
            background-color: #fcd34d;
            transform: translateY(-5px) scale(1.1);
        }
        
        .social-buttons {
            display: flex;
            gap: 0.75rem;
        }
        
        .social-btn {
            background-color: #1a0f08;
            color: #fde047;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 2px solid #fbbf24;
            transition: all 0.3s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .social-btn:hover {
            background-color: rgba(251, 191, 36, 0.2);
            transform: scale(1.2) rotate(5deg);
        }
        
        /* Seasons Section */
        .seasons-section {
            padding: 4rem 1rem;
            position: relative;
        }
        
        .seasons-title {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInLeft 0.6s ease-out;
        }
        
        @media (min-width: 768px) {
            .seasons-title {
                font-size: 3rem;
            }
        }
        
        .season-card {
            background-color: #1a0f08;
            border: 4px solid #fbbf24;
            border-radius: 0.5rem;
            margin-bottom: 4rem;
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out;
        }
        
        .season-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .season-header:hover {
            background-color: rgba(251, 191, 36, 0.1);
        }
        
        .season-title {
            font-size: 1.5rem;
            color: #fde047;
        }
        
        @media (min-width: 768px) {
            .season-title {
                font-size: 1.875rem;
            }
        }
        
        .chevron {
            width: 2rem;
            height: 2rem;
            color: #fbbf24;
            transition: transform 0.3s;
        }
        
        .chevron.rotated {
            transform: rotate(180deg);
        }
        
        .season-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
        }
        
        .season-content.active {
            max-height: 5000px;
        }
        
        .season-inner {
            padding: 1.5rem;
        }
        
        .season-description {
            color: rgba(251, 191, 36, 0.8);
            font-size: 1.125rem;
            margin-bottom: 2rem;
        }
        
        .images-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }
        
        @media (min-width: 768px) {
            .images-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        .image-card {
            cursor: pointer;
            transition: all 0.3s;
            animation: scaleIn 0.4s ease-out;
        }
        
        .image-card:hover {
            transform: translateY(-5px) scale(1.05) rotate(2deg);
        }
        
        .image-container {
            position: relative;
            border-radius: 0.5rem;
            overflow: hidden;
            border: 2px solid #fbbf24;
            background-color: rgba(251, 191, 36, 0.1);
        }
        
        .image-container img {
            width: 100%;
            height: 16rem;
            object-fit: cover;
            transition: transform 0.5s;
        }
        
        .image-card:hover .image-container img {
            transform: scale(1.1);
        }
        
        .image-overlay {
            position: absolute;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .image-card:hover .image-overlay {
            opacity: 1;
        }
        
        .overlay-text {
            color: white;
            font-size: 1.25rem;
            font-weight: bold;
        }
        
        .creator-info {
            margin-top: 0.75rem;
            padding: 0.5rem 1rem;
            background-color: rgba(251, 191, 36, 0.1);
            border-radius: 0.5rem;
            border: 1px solid rgba(251, 191, 36, 0.3);
            transition: border-color 0.3s;
        }
        
        .image-card:hover .creator-info {
            border-color: #fbbf24;
        }
        
        .creator-label {
            color: #fde047;
            font-size: 0.875rem;
        }
        
        .creator-name {
            color: #fbbf24;
            font-weight: bold;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 50;
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(4px);
            padding: 1rem;
            animation: fadeIn 0.3s ease-out;
        }
        
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
            animation: scaleIn 0.4s ease-out;
        }
        
        .modal img {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 0.5rem;
            border: 4px solid #fbbf24;
        }
        
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background-color: #fbbf24;
            color: #2a1810;
            padding: 0.75rem;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            z-index: 10;
        }
        
        .modal-close:hover {
            background-color: #fcd34d;
            transform: scale(1.1) rotate(90deg);
        }
        
        .modal-info {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            background-color: rgba(26, 15, 8, 0.9);
            backdrop-filter: blur(4px);
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            border: 2px solid #fbbf24;
        }
        
        .modal-hint {
            position: absolute;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(253, 224, 71, 0.6);
            font-size: 0.875rem;
        }
        
        /* Footer */
        footer {
            padding: 2rem 1rem;
            text-align: center;
            border-top: 2px solid rgba(251, 191, 36, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        footer p {
            color: rgba(251, 191, 36, 0.6);
            position: relative;
            z-index: 10;
        }
        
        /* Animations */
        @keyframes slideDown {
            from {
                transform: translateY(-100%);
            }
            to {
                transform: translateY(0);
            }
        }
        
        @keyframes fadeOut {
            to {
                opacity: 0;
                pointer-events: none;
            }
        }
        
        @keyframes zoomOut {
            to {
                transform: scale(0.3) translateY(-300px);
            }
        }
        
        @keyframes logoAppear {
            from {
                opacity: 0;
                transform: scale(0) rotateY(-180deg);
            }
            to {
                opacity: 1;
                transform: scale(1) rotateY(0deg);
            }
        }
        
        @keyframes textAppear {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes loadProgress {
            from {
                width: 0%;
            }
            to {
                width: 100%;
            }
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 0.3;
                transform: scale(1);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.2);
            }
        }
        
        @keyframes floatBlock {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-50px) rotate(180deg);
            }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        /* Icon styles */
        .icon {
            width: 1.5rem;
            height: 1.5rem;
        }
    </style>
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="bg-blocks">
            <!-- Background decoration blocks -->
        </div>
        <div class="splash-content">
            <div class="splash-logo-container">
                <div class="splash-glow"></div>
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Crect fill='%23fbbf24' x='50' y='30' width='100' height='100'/%3E%3Crect fill='%23fcd34d' x='70' y='50' width='20' height='20'/%3E%3Crect fill='%23fcd34d' x='110' y='50' width='20' height='20'/%3E%3Crect fill='%23f59e0b' x='80' y='90' width='40' height='10'/%3E%3Crect fill='%23fbbf24' x='50' y='130' width='40' height='50'/%3E%3Crect fill='%23fbbf24' x='110' y='130' width='40' height='50'/%3E%3C/svg%3E" alt="Важива Logo" class="splash-logo">

                    <div class="loading-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header>
        <div class="header-content">
            <div class="logo-section" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Crect fill='%23fbbf24' x='50' y='30' width='100' height='100'/%3E%3Crect fill='%23fcd34d' x='70' y='50' width='20' height='20'/%3E%3Crect fill='%23fcd34d' x='110' y='50' width='20' height='20'/%3E%3Crect fill='%23f59e0b' x='80' y='90' width='40' height='10'/%3E%3Crect fill='%23fbbf24' x='50' y='130' width='40' height='50'/%3E%3Crect fill='%23fbbf24' x='110' y='130' width='40' height='50'/%3E%3C/svg%3E" alt="Logo" class="logo">
                <span class="logo-text">ⲃⲁⲿυⲃⲁ</span>
            </div>
            <nav>
                <a href="#home">Головна</a>
                <a href="#seasons">Сезони</a>
                <a href="#community">Спільнота</a>
                <a href="#rules">Правила</a>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero" id="home">
        <div class="container">
            <h1>Ласкаво просимо на Важива SMP</h1>
            <p>Приєднуйтесь до нашої спільноти та створюйте незабутні пригоди разом!</p>
            <div class="cta-buttons">
                <a href="https://t.me/vazhyva_smp" class="btn-primary" target="_blank" rel="noopener">
                    Приєднатися до сервера
                </a>
                <div class="social-buttons">
                    <button class="social-btn" onclick="window.open('#', '_blank')" title="YouTube">

                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </button>
                    <button class="social-btn" onclick="window.open('https://t.me/vazhyva_smp', '_blank')" title="Telegram">
                        <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>

                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- Seasons Section -->
    <section class="seasons-section" id="seasons">
        <div class="container">
            <h2 class="seasons-title">Наші Сезони</h2>
            
            <div id="seasons-container">
                <!-- Seasons will be injected here by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="bg-blocks">
            <!-- Footer decoration -->
        </div>
        <p>© 2026 Важива SMP. Всі права захищені.</p>
    </footer>

    <!-- Image Modal -->
    <div id="image-modal" class="modal" onclick="closeModal()">
        <button class="modal-close" onclick="closeModal()">
            <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
        <div class="modal-content" onclick="event.stopPropagation()">
            <img id="modal-image" src="" alt="">
            <div class="modal-info">
                <p class="creator-label">Створив(ла):</p>
                <p class="creator-name" id="modal-creator"></p>
            </div>
            <p class="modal-hint">Натисніть будь-де для закриття</p>
        </div>

    <script>
        // Season data
        const seasons = [
            {
                id: 1,
                title: "Сезон 1: Початок",
                description: "Перший сезон нашого SMP серверу, де все почалося. Гравці створили свої перші бази, встановили торгові зв'язки та заклали основу для майбутніх пригод.",
                images: [
                    {
                        url: "https://images.unsplash.com/photo-1706395538832-8a40b749524d?w=1080&q=80",
                        creator: "Steve_Builder"
                    },
                    {
                        url: "https://images.unsplash.com/photo-1769426702799-276c1986b5f3?w=1080&q=80",
                        creator: "Alex_Master"
                    }
                ]
            },
            {
                id: 2,
                title: "Сезон 2: Епоха Розквіту",
                description: "Другий сезон приніс нові виклики і можливості. Гравці побудували величні замки, автоматичні ферми та створили унікальні міні-ігри.",
                images: [
                    {
                        url: "https://images.unsplash.com/photo-1606048683263-ce0673504920?w=1080&q=80",
                        creator: "Enderman_Pro"
                    },
                    {
                        url: "https://images.unsplash.com/photo-1759663174469-f1e2a7a4bdcb?w=1080&q=80",
                        creator: "Creeper_Queen"
                    }
                ]
            },
            {
                id: 3,
                title: "Сезон 3: Нові Горизонти",
                description: "Третій сезон запропонував нові можливості з модами та плагінами. Спільнота розрослася, а будівлі стали ще більш вражаючими.",
                images: [
                    {
                        url: "https://images.unsplash.com/photo-1759663174515-9057d83c8b8f?w=1080&q=80",
                        creator: "Diamond_Digger"
                    },
                    {
                        url: "https://images.unsplash.com/photo-1723612955177-96010a7a0cc0?w=1080&q=80",
                        creator: "Redstone_Wizard"
                    }
                ]
            }
        ];

        // Hide splash screen after 3.5 seconds
        setTimeout(() => {
            document.getElementById('splash-screen').classList.add('hidden');
        }, 3500);

        // Generate seasons HTML
        function generateSeasons() {
            const container = document.getElementById('seasons-container');
            
            seasons.forEach((season, index) => {
                const seasonCard = document.createElement('div');
                seasonCard.className = 'season-card';
                seasonCard.style.animationDelay = `${index * 0.2}s`;
                
                seasonCard.innerHTML = `
                    <div class="season-header" onclick="toggleSeason(${season.id})">
                        <h3 class="season-title">${season.title}</h3>
                        <svg class="chevron" id="chevron-${season.id}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </div>
                    <div class="season-content" id="content-${season.id}">
                        <div class="season-inner">
                            <p class="season-description">${season.description}</p>
                            <div class="images-grid">
                                ${season.images.map((image, imgIndex) => `
                                    <div class="image-card" style="animation-delay: ${imgIndex * 0.1}s" onclick="openModal('${image.url}', '${image.creator}')">
                                        <div class="image-container">
                                            <img src="${image.url}" alt="Screenshot by ${image.creator}" loading="lazy">
                                            <div class="image-overlay">
                                                <span class="overlay-text">Натисніть для перегляду</span>
                                            </div>
                                        </div>
                                        <div class="creator-info">
                                            <p class="creator-label">Створив(ла):</p>
                                            <p class="creator-name">${image.creator}</p>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
                
                container.appendChild(seasonCard);
            });
        }

        // Toggle season content
        function toggleSeason(seasonId) {
            const content = document.getElementById(`content-${seasonId}`);
            const chevron = document.getElementById(`chevron-${seasonId}`);
            
            const isActive = content.classList.contains('active');
            
            // Close all other seasons
            document.querySelectorAll('.season-content').forEach(c => {
                c.classList.remove('active');
            });
            document.querySelectorAll('.chevron').forEach(ch => {
                ch.classList.remove('rotated');
            });
            
            // Toggle current season
            if (!isActive) {
                content.classList.add('active');
                chevron.classList.add('rotated');
            }
        }

        // Open modal
        function openModal(imageUrl, creator) {
            const modal = document.getElementById('image-modal');
            const modalImage = document.getElementById('modal-image');
            const modalCreator = document.getElementById('modal-creator');
            
            modalImage.src = imageUrl;
            modalCreator.textContent = creator;
            modal.classList.add('active');
            
            // Prevent body scroll
            document.body.style.overflow = 'hidden';
        }

        // Close modal
        function closeModal() {
            const modal = document.getElementById('image-modal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Close modal on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Smooth scroll for navigation
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            generateSeasons();
        });
    </script>
</body>
</html>
