<!DOCTYPE html>
<html lang="uk">
<head>
    <link rel="icon" type="image/png" href="/favicon.png">
    <title>Учасники - Важива</title>
    <meta name="description" content="нова генерація коаліційних ком'юніті">
    <meta name="keywords" content="minecraft, server, smp, vazhyva, bedrock, майнкрат, сервер, смп, важива, бедрок">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <style>
        @font-face {
            font-family: 'Minecraft';
            src: url('https://cdn.jsdelivr.net/gh/IdreesInc/Monocraft@main/fonts/woff2/Monocraft.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'MinecraftRegular';
            src: url('https://cdn.jsdelivr.net/gh/South-Paw/typeface-minecraft@master/files/minecraft-regular.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Minecraft', 'MinecraftRegular', monospace;
            background-color: #2a1810;
            color: #fde047;
            overflow-x: hidden;
            position: relative;
        }
        
        /* Particle Background */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        
        /* Parallax Background */
        .parallax-bg {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: 0;
            background: radial-gradient(circle at 30% 50%, rgba(251, 191, 36, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(251, 191, 36, 0.08) 0%, transparent 40%);
            will-change: transform;
        }
        
        /* Fog-like gradients */
        .fog-layer {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 2;
            pointer-events: none;
            background: linear-gradient(180deg, 
                rgba(251, 191, 36, 0.03) 0%, 
                transparent 30%, 
                transparent 70%, 
                rgba(251, 191, 36, 0.05) 100%);
        }
        
        /* Light streaks */
        .light-streak {
            position: fixed;
            width: 2px;
            height: 100px;
            background: linear-gradient(180deg, transparent, rgba(251, 191, 36, 0.3), transparent);
            z-index: 2;
            pointer-events: none;
            animation: streak 10s linear infinite;
        }
        
        .light-streak:nth-child(1) {
            left: 15%;
            animation-delay: 0s;
        }
        
        .light-streak:nth-child(2) {
            left: 50%;
            animation-delay: 4s;
        }
        
        .light-streak:nth-child(3) {
            left: 85%;
            animation-delay: 7s;
        }
        
        @keyframes streak {
            0% {
                top: -100px;
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                top: 100vh;
                opacity: 0;
            }
        }
        
        /* Content */
        .content {
            position: relative;
            z-index: 10;
        }
        
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        
        /* Header */
        header {
            background-color: rgba(26, 15, 8, 0.95);
            border-bottom: 4px solid #fbbf24;
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(10px);
        }
        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            max-width: 1280px;
            margin: 0 auto;
        }
        .logo-section {
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .logo-section:hover {
            transform: scale(1.05);
        }
        .logo {
            height: 4rem;
            width: auto;
        }
        .logo-text {
            font-size: 2rem;
            color: #fbbf24;
            font-weight: bold;
        }
        nav {
            display: none;
            gap: 1.5rem;
        }
        @media (min-width: 768px) {
            nav {
                display: flex;
            }
            .logo {
                height: 4rem;
            }
            .logo-text {
                font-size: 2.5rem;
            }
        }
        nav a {
            color: #fde047;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            transition: all 0.3s;
        }
        nav a:hover {
            color: #fbbf24;
            background-color: rgba(251, 191, 36, 0.1);
            transform: scale(1.1);
        }
        
        /* Main Section */
        .main-section {
            min-height: 100vh;
            padding: 3rem 1rem;
        }
        
        .section-title {
            text-align: center;
            font-size: 3rem;
            color: #fbbf24;
            margin-bottom: 3rem;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
        }
        
        /* Players Grid */
        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2.5rem;
            margin-bottom: 3rem;
        }
        
        .player-card {
            background: linear-gradient(145deg, rgba(26, 15, 8, 0.9), rgba(42, 24, 16, 0.8));
            border: 2px solid #fbbf24;
            border-radius: 20px;
            padding: 2.5rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(251, 191, 36, 0.2);
        }
        
        .player-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(251, 191, 36, 0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.5s;
        }
        
        .player-card:hover::before {
            left: 100%;
        }
        
        .player-card:hover {
            transform: translateY(-15px) scale(1.03);
            box-shadow: 
                0 20px 50px rgba(251, 191, 36, 0.3),
                0 0 30px rgba(251, 191, 36, 0.2),
                inset 0 1px 0 rgba(251, 191, 36, 0.4);
            border-color: #fcd34d;
        }
        
        .player-avatar {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            margin: 0 auto 1.5rem;
            border: 3px solid #fbbf24;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
            box-shadow: 
                0 8px 20px rgba(251, 191, 36, 0.3),
                inset 0 2px 10px rgba(255, 255, 255, 0.2);
            transform-style: preserve-3d;
            overflow: hidden;
        }
        
        .player-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 17px;
        }
        
        .player-card:hover .player-avatar {
            transform: translateZ(20px) rotateY(10deg);
            box-shadow: 
                0 15px 35px rgba(251, 191, 36, 0.5),
                inset 0 2px 10px rgba(255, 255, 255, 0.3);
        }
        
        .player-name {
            font-size: 1.5rem;
            color: #fbbf24;
            margin-bottom: 0.8rem;
            text-shadow: 0 2px 10px rgba(251, 191, 36, 0.3);
            position: relative;
        }
        
        .player-role-badge {
            display: inline-block;
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.3), rgba(251, 191, 36, 0.15));
            color: #fbbf24;
            padding: 0.5rem 1.2rem;
            border-radius: 12px;
            font-size: 0.9rem;
            border: 1px solid rgba(251, 191, 36, 0.4);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            position: relative;
        }
        
        /* Profile Modal */
        .profile-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            backdrop-filter: blur(10px);
        }
        
        .profile-modal.active {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        .profile-content {
            background: linear-gradient(145deg, rgba(26, 15, 8, 0.98), rgba(42, 24, 16, 0.95));
            border: 3px solid #fbbf24;
            border-radius: 30px;
            padding: 3rem;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: slideUp 0.4s ease-out;
            box-shadow: 
                0 30px 80px rgba(0, 0, 0, 0.5),
                0 0 50px rgba(251, 191, 36, 0.2),
                inset 0 1px 0 rgba(251, 191, 36, 0.3);
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(50px) scale(0.95);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }
        
        .close-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #2a1810;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Minecraft', monospace;
            box-shadow: 0 5px 15px rgba(251, 191, 36, 0.4);
        }
        
        .close-btn:hover {
            background: linear-gradient(135deg, #fcd34d, #fbbf24);
            transform: rotate(90deg) scale(1.1);
            box-shadow: 0 8px 25px rgba(251, 191, 36, 0.6);
        }
        
        .profile-header {
            text-align: center;
            margin-bottom: 2.5rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid rgba(251, 191, 36, 0.2);
        }
        
        .profile-avatar-large {
            width: 150px;
            height: 150px;
            border-radius: 25px;
            margin: 0 auto 1.5rem;
            border: 4px solid #fbbf24;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            box-shadow: 
                0 15px 40px rgba(251, 191, 36, 0.4),
                inset 0 2px 10px rgba(255, 255, 255, 0.2);
            overflow: hidden;
        }
        
        .profile-avatar-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 21px;
        }
        
        .profile-name {
            font-size: 2.5rem;
            color: #fbbf24;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
        }
        
        .profile-username {
            font-size: 1.2rem;
            color: rgba(251, 191, 36, 0.7);
            margin-bottom: 1rem;
        }
        
        .profile-role {
            display: inline-block;
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.3), rgba(251, 191, 36, 0.15));
            color: #fbbf24;
            padding: 0.7rem 2rem;
            border-radius: 15px;
            font-size: 1.1rem;
            border: 2px solid rgba(251, 191, 36, 0.5);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        /* Footer */
        footer {
            padding: 2rem 1rem;
            text-align: center;
            border-top: 2px solid rgba(251, 191, 36, 0.2);
        }
        
        footer p {
            color: rgba(251, 191, 36, 0.6);
        }
        
        /* Social Links */
        .social-links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }
        
        .social-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.5rem;
            border-radius: 15px;
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.3s;
            border: 2px solid;
            background: linear-gradient(145deg, rgba(26, 15, 8, 0.8), rgba(42, 24, 16, 0.6));
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .social-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }
        
        .social-btn.youtube {
            color: #FF0000;
            border-color: #FF0000;
        }
        
        .social-btn.youtube:hover {
            background: linear-gradient(145deg, rgba(255, 0, 0, 0.2), rgba(255, 0, 0, 0.1));
            box-shadow: 0 10px 25px rgba(255, 0, 0, 0.3);
        }
        
        .social-btn.twitch {
            color: #9146FF;
            border-color: #9146FF;
        }
        
        .social-btn.twitch:hover {
            background: linear-gradient(145deg, rgba(145, 70, 255, 0.2), rgba(145, 70, 255, 0.1));
            box-shadow: 0 10px 25px rgba(145, 70, 255, 0.3);
        }
        
        .social-btn.telegram {
            color: #0088cc;
            border-color: #0088cc;
        }
        
        .social-btn.telegram:hover {
            background: linear-gradient(145deg, rgba(0, 136, 204, 0.2), rgba(0, 136, 204, 0.1));
            box-shadow: 0 10px 25px rgba(0, 136, 204, 0.3);
        }
        
        .social-icon {
            width: 20px;
            height: 20px;
        }
        
        .profile-section {
            margin-bottom: 2.5rem;
        }
        
        .profile-section h3 {
            color: #fbbf24;
            font-size: 1.6rem;
            margin-bottom: 1.2rem;
            padding-bottom: 0.7rem;
            border-bottom: 2px solid rgba(251, 191, 36, 0.3);
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.3);
        }
        
        .profile-section p {
            line-height: 1.8;
            font-size: 1.1rem;
        }
        
        /* Server Lists */
        .servers-container {
            display: grid;
            gap: 1.5rem;
        }
        
        .server-category {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.1), rgba(251, 191, 36, 0.05));
            padding: 1.5rem;
            border-radius: 15px;
            border: 2px solid rgba(251, 191, 36, 0.3);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .server-category h4 {
            color: #fbbf24;
            font-size: 1.2rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .server-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        
        .server-item {
            background: rgba(26, 15, 8, 0.6);
            padding: 1rem 1.2rem;
            border-radius: 12px;
            border-left: 4px solid;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }
        
        .server-item.active {
            border-color: #10b981;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.15), rgba(16, 185, 129, 0.05));
        }
        
        .server-item.inactive {
            border-color: #6b7280;
            opacity: 0.7;
        }
        
        .server-item:hover {
            transform: translateX(10px);
            box-shadow: 0 5px 20px rgba(251, 191, 36, 0.2);
        }
        
        .server-name {
            font-size: 1.05rem;
        }
        
        .server-status {
            font-size: 0.85rem;
            padding: 0.3rem 0.8rem;
            border-radius: 8px;
            font-weight: bold;
        }
        
        .server-status.active {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }
        
        .server-status.inactive {
            background: rgba(107, 114, 128, 0.2);
            color: #9ca3af;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }
        
        .stat-box {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.15), rgba(251, 191, 36, 0.05));
            padding: 1.2rem;
            border-radius: 15px;
            border: 2px solid rgba(251, 191, 36, 0.3);
            text-align: center;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .stat-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(251, 191, 36, 0.3);
            border-color: #fbbf24;
        }
        
        .stat-box h4 {
            color: #fbbf24;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        
        .stat-box p {
            font-size: 1.3rem;
            color: #fde047;
        }
        
        /* Performance optimizations */
        @media (max-width: 768px) {
            #particles-canvas {
                opacity: 0.5;
            }
            .parallax-bg {
                opacity: 0.7;
            }
            .light-streak {
                display: none;
            }
            .profile-content {
                padding: 2rem 1.5rem;
            }
            .section-title {
                font-size: 2rem;
            }
            .players-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* Scrollbar styling */
        .profile-content::-webkit-scrollbar {
            width: 12px;
        }
        
        .profile-content::-webkit-scrollbar-track {
            background: rgba(251, 191, 36, 0.1);
            border-radius: 10px;
        }
        
        .profile-content::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #fbbf24, #f59e0b);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        }
        
        .profile-content::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #fcd34d, #fbbf24);
        }
    </style>
</head>
<body>
    <!-- Parallax Background -->
    <div class="parallax-bg" id="parallax"></div>
    
    <!-- Particle Background -->
    <canvas id="particles-canvas"></canvas>
    
    <!-- Fog Layer -->
    <div class="fog-layer"></div>
    
    <!-- Light Streaks -->
    <div class="light-streak"></div>
    <div class="light-streak"></div>
    <div class="light-streak"></div>
    
    <!-- Content -->
    <div class="content">
        <!-- Header -->
        <header>

        document.getElementById('profileModal').addEventListener('click', function(e) {

        // Initialize
        renderPlayers();
        
        // Particle System
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const particles = [];
        const particleCount = Math.min(50, Math.floor(window.innerWidth / 20));
        
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            
            draw() {
                ctx.fillStyle = `rgba(251, 191, 36, ${this.opacity})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'rgba(251, 191, 36, 0.8)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }
        
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }
        
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            requestAnimationFrame(animateParticles);
        }
        
        animateParticles();
        
        // Parallax Effect
        const parallax = document.getElementById('parallax');
        let scrollPos = 0;
        
        window.addEventListener('scroll', () => {
            scrollPos = window.pageYOffset;
            parallax.style.transform = `translate(${scrollPos * 0.02}px, ${scrollPos * 0.05}px)`;
        });
        
        // Resize handler
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        // Player search
document.getElementById("playerSearch").addEventListener("input", function(){

const value = this.value.toLowerCase();

const filtered = players.filter(player =>
player.name.toLowerCase().includes(value) ||
player.username.toLowerCase().includes(value)
);

const grid = document.getElementById('playersGrid');

grid.innerHTML = filtered.map(player => `
<div class="player-card" onclick="openProfile(${player.id})">
<div class="player-avatar">
<img src="${player.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:16px;">
</div>
<div class="player-name">${player.name}</div>
<div class="player-role-badge">${player.role}</div>
</div>
`).join('');

});
    </script>
